<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção de Cães (ONG)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="sectitulo">
        <div id="divtitulo">
            <h1 id="titulo">Adotar um doguinho!</h1>
        </div>
    </section>

    <div class="container">

        <form action="" id="formulario">

            <fieldset id="first">
                <label for="nome">Nome:</label> <br>
                <input type="text" id="nome" placeholder="Nome">
                <div class="erro" id="erroNome"></div>
            </fieldset>

            <fieldset>
                <label for="email">Email:</label> <br>
                <input type="email" id="email" placeholder="Email">
                <div class="erro" id="erroEmail"></div>
            </fieldset>

            <fieldset>
                <label for="telefone">Telefone:</label> <br>
                <input type="number" id="telefone" placeholder="+55...">
                <div class="erro" id="erroTelefone"></div>
            </fieldset>

            <fieldset>
                <label for="cpf">CPF:</label> <br>
                <input type="number" id="cpf" placeholder="CPF">
                <div class="erro" id="erroCpf"></div>
            </fieldset>

            <fieldset>
                <label for="idade">Idade:</label> <br>
                <input type="number" id="idade" placeholder="Idade">
                <div class="erro" id="erroIdade"></div>
            </fieldset>

            <fieldset>
                <label for="cidade">Cidade</label> <br>
                <input type="text" id="cidade" placeholder="cidade">
                <div class="erro" id="erroCidade"></div>
            </fieldset>


            <fieldset>
                <label for="moradia">Tipo de moradia:</label> <br>
                
                <input type="radio" id="casa" name="moradia" value="casa">
                <label for="casa">casa</label> <br>

                <input type="radio" id="ap" name="moradia" value="ap">
                <label for="casa">Apartamento</label> <br>
                <div class="erro" id="erroMoradia"></div>
            </fieldset>
                

            <fieldset>
                <label for="quintal">Possui quintal?</label> <br>

                <input type="radio" id="simQuintal" name="quintal" value="possui">
                <label for="simQuintal">Sim</label> <br>

                <input type="radio" id="naoQuintal" name="quintal" value="naoPossui">
                <label for="naoQuintal">Não</label> <br>
                <div class="erro" id="erroQuintal"></div>
            </fieldset>


            <fieldset>
                <label for="">Ja teve pet?</label> <br>

                <input type="radio" id="simPet" name="pet" value="teve">
                <label for="simPet">Sim</label> <br>

                <input type="radio" id="naoPet" name="pet" value="naoTeve">
                <label for="naoPet">Não</label> <br>
                <div class="erro" id="erroPet"></div>
            </fieldset>

            
            <fieldset>
                <label for="tempo">Quanto tempo o animal ficara sozinho?</label> <br>
                <input type="number" id="tempo" placeholder="Tempo:">
                <div class="erro" id="erroTempo"></div>
            </fieldset>

            <fieldset id="first">
                <label for="motivo">Qual o motivo da adoção</label> <br>
                <input type="text" id="motivo" placeholder="Motivo:">
                <div class="erro" id="erroMotivo"></div>
            </fieldset>

            <fieldset id="first">
                <label for="termo">Aceitar termos de uso</label> <br>
                <input type="checkbox" id="termo">
                <div class="erro" id="erroTermo"></div>
            </fieldset>

            <fieldset>
                <button id="enviar" type="submit">Enviar</button>
            </fieldset>

        </form>

    </div>



</body>
    <script src="script.js"></script>
</html>
